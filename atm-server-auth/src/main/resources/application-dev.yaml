spring:
  datasource:
    url: jdbc:h2:mem:atm_dev;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=ACCOUNT,CUSTOMER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:dev/schema.sql
      data-locations: classpath:dev/data.sql

logging:
  level:
    com.atm.atmserver: debug
    org.springframework: info
